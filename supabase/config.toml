# Config para Supabase CLI (opcional, solo si querés correr Supabase local)
# Docs: https://supabase.com/docs/guides/local-development/cli/config
project_id = "dashboard-mkt"

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true
