name: Meta paid creatives sync (1x/día)

# Schedule diario 07:30 ART (10:30 UTC). Sincroniza el mes en curso de la Ad
# Account de Mabe Argentina (act_1428795852368328) que OMD comparte con nuestro
# BM. Para correr manual o backfill de meses pasados usar workflow_dispatch.
on:
  schedule:
    - cron: "30 10 * * *"  # 10:30 UTC = 07:30 ART
  workflow_dispatch:
    inputs:
      debug:
        description: "Modo debug: lista businesses/cuentas/permisos que ve el token (no sincroniza)"
        type: boolean
        default: false
      act_id:
        description: "Forzar Ad Account (ej. act_1428795852368328). Vacío = autodescubrir por nombre 'drean'."
        required: false
        default: ""
      mes:
        description: "Mes a sincronizar YYYY-MM (ej. 2026-05). Vacío = mes actual."
        required: false
        default: ""

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/meta-paid-sync
        run: |
          set -euo pipefail
          BASE="https://dashboard-mkt-seven.vercel.app/api/cron/meta-paid-sync"

          # Armar query string desde los inputs (cada uno opcional).
          QS=""
          if [ "${DEBUG:-false}" = "true" ]; then QS="${QS}&debug=1"; fi
          if [ -n "${ACT_ID:-}" ]; then QS="${QS}&act_id=${ACT_ID}"; fi
          if [ -n "${MES:-}" ]; then QS="${QS}&mes=${MES}"; fi
          QS="${QS#&}"  # sacar el '&' inicial
          if [ -n "$QS" ]; then URL="${BASE}?${QS}"; else URL="${BASE}"; fi
          echo "GET $URL"

          # -sS (sin -f) para capturar el body aun en HTTP 4xx/5xx: el JSON de
          # error trae la causa (phase, error, lista de cuentas que ve el token).
          if [ -n "${CRON_SECRET:-}" ]; then
            HTTP=$(curl -sS -o out.json -w '%{http_code}' --max-time 600 "$URL" \
              -H "Authorization: Bearer $CRON_SECRET")
          else
            HTTP=$(curl -sS -o out.json -w '%{http_code}' --max-time 600 "$URL")
          fi
          echo "HTTP $HTTP"
          echo "----- respuesta -----"
          cat out.json || true
          echo ""
          echo "---------------------"
          if [ "$HTTP" -ge 400 ] || grep -q '"ok":false' out.json; then
            echo "Cron falló (HTTP $HTTP)"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEBUG: ${{ inputs.debug }}
          ACT_ID: ${{ inputs.act_id }}
          MES: ${{ inputs.mes }}
