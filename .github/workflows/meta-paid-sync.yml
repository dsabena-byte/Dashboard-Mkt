name: Meta paid creatives sync (1x/día)

# DESHABILITADO el schedule automático hasta que OMD comparta la Ad Account
# de Drean con nuestro BM 122350585916257. Se puede disparar manual desde
# Actions → Run workflow. Una vez que OMD comparta, reactivar el schedule
# descomentando el bloque on.schedule.
on:
  # schedule:
  #   - cron: "30 10 * * *"  # 10:30 UTC = 07:30 ART
  workflow_dispatch:
    inputs:
      debug:
        description: "Modo debug: lista businesses/cuentas/permisos que ve el token (no sincroniza)"
        type: boolean
        default: false
      act_id:
        description: "Forzar Ad Account (ej. act_1428795852368328). Vacío = autodescubrir por nombre 'drean'."
        required: false
        default: ""
      mes:
        description: "Mes a sincronizar YYYY-MM (ej. 2026-05). Vacío = mes actual."
        required: false
        default: ""

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/meta-paid-sync
        run: |
          set -euo pipefail
          BASE="https://dashboard-mkt-seven.vercel.app/api/cron/meta-paid-sync"

          # Armar query string desde los inputs (cada uno opcional).
          QS=""
          if [ "${DEBUG:-false}" = "true" ]; then QS="${QS}&debug=1"; fi
          if [ -n "${ACT_ID:-}" ]; then QS="${QS}&act_id=${ACT_ID}"; fi
          if [ -n "${MES:-}" ]; then QS="${QS}&mes=${MES}"; fi
          QS="${QS#&}"  # sacar el '&' inicial
          if [ -n "$QS" ]; then URL="${BASE}?${QS}"; else URL="${BASE}"; fi
          echo "GET $URL"

          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS --max-time 600 "$URL" \
              -H "Authorization: Bearer $CRON_SECRET" | tee out.json
          else
            curl -fsS --max-time 600 "$URL" | tee out.json
          fi
          echo ""
          if grep -q '"ok":false' out.json; then
            echo "Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEBUG: ${{ inputs.debug }}
          ACT_ID: ${{ inputs.act_id }}
          MES: ${{ inputs.mes }}
