name: Meta paid creatives sync (1x/día)

# Schedule diario 07:30 ART (10:30 UTC). Sincroniza el mes en curso + los 2
# anteriores de la Ad Account de Mabe Argentina (act_1428795852368328) que OMD
# comparte con nuestro BM. Cubrir 3 meses captura atribuciones tardías de Meta
# (típicas en los primeros 14 días del mes siguiente).
#
# Manual: si pasás un `mes` específico vía workflow_dispatch, sincroniza solo
# ese mes (útil para backfill puntual).
on:
  schedule:
    - cron: "30 10 * * *"  # 10:30 UTC = 07:30 ART
  workflow_dispatch:
    inputs:
      debug:
        description: "Modo debug: lista businesses/cuentas/permisos que ve el token (no sincroniza)"
        type: boolean
        default: false
      act_id:
        description: "Forzar Ad Account (ej. act_1428795852368328). Vacío = autodescubrir por nombre 'drean'."
        required: false
        default: ""
      mes:
        description: "Mes específico YYYY-MM (ej. 2026-05). Vacío = sincroniza mes actual + 2 anteriores."
        required: false
        default: ""
      repair:
        description: "Repair de imágenes: re-mirror de piezas con imagen vieja (ads eliminados). No sincroniza métricas."
        type: boolean
        default: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger /api/cron/meta-paid-sync
        run: |
          set -euo pipefail
          BASE="https://dashboard-mkt-seven.vercel.app/api/cron/meta-paid-sync"

          AUTH=()
          if [ -n "${CRON_SECRET:-}" ]; then AUTH=(-H "Authorization: Bearer ${CRON_SECRET}"); fi

          # Modo repair: re-mirror de piezas con imagen vieja, en loop hasta terminar.
          if [ "${REPAIR:-false}" = "true" ]; then
            echo "===== REPAIR de imágenes ====="
            for i in $(seq 1 30); do
              HTTP=$(curl -sS -o out.json -w '%{http_code}' --max-time 120 "${BASE}?repair=1" "${AUTH[@]}")
              echo "Iteración $i → HTTP $HTTP"
              cat out.json; echo ""
              REST=$(grep -o '"restantes":[0-9]*' out.json | grep -o '[0-9]*' || echo "")
              if [ "$HTTP" -ge 400 ]; then echo "Repair falló"; exit 1; fi
              if [ "${REST:-0}" = "0" ]; then echo "Repair completo"; break; fi
            done
            exit 0
          fi

          # Build common query suffix (debug + act_id)
          COMMON_QS=""
          if [ "${DEBUG:-false}" = "true" ]; then COMMON_QS="${COMMON_QS}&debug=1"; fi
          if [ -n "${ACT_ID:-}" ]; then COMMON_QS="${COMMON_QS}&act_id=${ACT_ID}"; fi

          # Lista de meses a sincronizar
          if [ -n "${MES:-}" ]; then
            # Manual con mes específico
            MESES_TO_SYNC="${MES}"
          else
            # Schedule o manual sin mes: últimos 3 meses (current + 2 prior)
            MESES_TO_SYNC=$(for OFFSET in 0 1 2; do
              date -u -d "-${OFFSET} months" +%Y-%m
            done | tr '\n' ' ')
          fi
          echo "Meses a sincronizar: ${MESES_TO_SYNC}"

          FAIL_COUNT=0
          for MES_TO_SYNC in $MESES_TO_SYNC; do
            QS="mes=${MES_TO_SYNC}${COMMON_QS}"
            URL="${BASE}?${QS}"
            echo ""
            echo "===== Sincronizando ${MES_TO_SYNC} ====="
            echo "GET $URL"
            if [ -n "${CRON_SECRET:-}" ]; then
              HTTP=$(curl -sS -o out.json -w '%{http_code}' --max-time 600 "$URL" \
                -H "Authorization: Bearer $CRON_SECRET")
            else
              HTTP=$(curl -sS -o out.json -w '%{http_code}' --max-time 600 "$URL")
            fi
            echo "HTTP $HTTP"
            echo "----- respuesta -----"
            cat out.json || true
            echo ""
            echo "---------------------"
            if [ "$HTTP" -ge 400 ] || grep -q '"ok":false' out.json; then
              echo "Cron falló para ${MES_TO_SYNC} (HTTP $HTTP)"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️  $FAIL_COUNT mes(es) fallaron"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEBUG: ${{ inputs.debug }}
          ACT_ID: ${{ inputs.act_id }}
          MES: ${{ inputs.mes }}
          REPAIR: ${{ inputs.repair }}
