name: Meta FB sync (cada 12h)

on:
  schedule:
    - cron: "0 */12 * * *"  # 00:00 y 12:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: "Días hacia atrás a sincronizar (200 = backfill de todo 2026)"
        type: string
        default: "3"

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/meta-fb-sync
        run: |
          set -euo pipefail
          DAYS="${DAYS_INPUT:-3}"
          URL="https://dashboard-mkt-seven.vercel.app/api/cron/meta-fb-sync?days=${DAYS}"
          echo "GET $URL"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS --max-time 600 "$URL" \
              -H "Authorization: Bearer $CRON_SECRET" | tee out.json
          else
            curl -fsS --max-time 600 "$URL" | tee out.json
          fi
          if grep -q '"ok":false' out.json; then
            echo "Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DAYS_INPUT: ${{ inputs.days }}
