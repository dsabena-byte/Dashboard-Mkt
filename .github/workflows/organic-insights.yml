name: Organic insights (1x/día)

# Genera el análisis automático de orgánico Drean (IG + FB) sobre los últimos
# 30 días vs los 30d previos. Idempotente: upsert por (categoria, signal_key)
# en insights_log.

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC = 04:00 ART (después de los syncs de IG/FB)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger /api/cron/organic-insights
        run: |
          set -euo pipefail
          URL="https://dashboard-mkt-seven.vercel.app/api/cron/organic-insights"
          echo "GET $URL"
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" --max-time 300 \
            -H "Authorization: Bearer ${CRON_SECRET:-}" \
            "$URL")
          echo "HTTP $HTTP_CODE"
          echo "Response body:"
          cat response.json
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          if grep -q '"ok":false' response.json; then
            echo "::error::Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
