name: GA4 web traffic sync (cada 6h)

on:
  schedule:
    - cron: "30 */6 * * *"  # 00:30, 06:30, 12:30, 18:30 UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/ga4-web-traffic
        run: |
          set -euo pipefail
          URL="https://dashboard-mkt-seven.vercel.app/api/cron/ga4-web-traffic?days=3"
          echo "GET $URL"
          # Capturamos status code Y body para diagnosticar errores
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" --max-time 600 \
            -H "Authorization: Bearer ${CRON_SECRET:-}" \
            "$URL")
          echo "HTTP $HTTP_CODE"
          echo "Response body:"
          cat response.json
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          if grep -q '"ok":false' response.json; then
            echo "::error::Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
