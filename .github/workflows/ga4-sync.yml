name: GA4 web traffic sync (cada 6h)

on:
  schedule:
    - cron: "30 */6 * * *"  # 00:30, 06:30, 12:30, 18:30 UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/ga4-web-traffic
        run: |
          set -euo pipefail
          URL="https://dashboard-mkt-seven.vercel.app/api/cron/ga4-web-traffic?days=3"
          echo "GET $URL"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS --max-time 600 "$URL" \
              -H "Authorization: Bearer $CRON_SECRET" | tee out.json
          else
            curl -fsS --max-time 600 "$URL" | tee out.json
          fi
          if grep -q '"ok":false' out.json; then
            echo "Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
