name: IG sentiment analysis (1x/día)

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC = 05:00 ART
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/ig-sentiment-analysis
        run: |
          set -euo pipefail
          URL="https://dashboard-mkt-seven.vercel.app/api/cron/ig-sentiment-analysis?batch=5"
          echo "GET $URL"
          if [ -n "${CRON_SECRET:-}" ]; then
            curl -fsS --max-time 600 "$URL" \
              -H "Authorization: Bearer $CRON_SECRET" | tee out.json
          else
            curl -fsS --max-time 600 "$URL" | tee out.json
          fi
          if grep -q '"ok":false' out.json; then
            echo "Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
