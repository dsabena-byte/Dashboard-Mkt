name: Planning media sync (Drive → Supabase, cada 6h)

on:
  schedule:
    - cron: "15 */6 * * *"  # 00:15, 06:15, 12:15, 18:15 UTC
  workflow_dispatch:
    inputs:
      year:
        description: "Año a sincronizar (default: año actual)"
        required: false
        default: ""

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger /api/cron/planning-media-sync
        run: |
          set -euo pipefail
          BASE="https://dashboard-mkt-seven.vercel.app/api/cron/planning-media-sync"
          if [ -n "${YEAR_INPUT:-}" ]; then
            URL="${BASE}?year=${YEAR_INPUT}"
          else
            URL="${BASE}"
          fi
          echo "GET $URL"
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" --max-time 600 \
            -H "Authorization: Bearer ${CRON_SECRET:-}" \
            "$URL")
          echo "HTTP $HTTP_CODE"
          echo "Response body:"
          cat response.json
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Endpoint returned HTTP $HTTP_CODE"
            exit 1
          fi
          if grep -q '"ok":false' response.json; then
            echo "::error::Cron devolvió ok=false"
            exit 1
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          YEAR_INPUT: ${{ inputs.year }}
